###############################################################################
#                                                                             #
#                     Nordix AMD GPU Configuration                            #
#                                                                             #
#  File:      /etc/modprobe.d/amdgpu.conf                                     #
#  Purpose:   Kernel module parameters for the amdgpu driver                  #
#  Applies:   AMD Radeon RX 400+ (Polaris / GCN 4.0), Vega, RDNA 1/2/3/4      #
#                                                                             #
#  After making changes you must either:                                      #
#    1. Reboot the system, OR                                                 #
#    2. Rebuild initramfs (sudo mkinitcpio -P) and then reboot                #
#       (required if amdgpu is loaded from initramfs via MODULES=())          #
#                                                                             #
#  To verify a parameter is active after reboot:                              #
#    cat /sys/module/amdgpu/parameters/<parameter_name>                       #
#                                                                             #
#  WARNING: Incorrect values may cause display corruption, GPU hangs,         #
#           or failure to boot into a graphical session. Always change        #
#           one parameter at a time and test before proceeding.               #
#                                                                             #
###############################################################################


###############################################################################
# LEGACY GPU SUPPORT (Southern Islands / Sea Islands)
###############################################################################
#
# By default the older "radeon" driver claims Southern Islands (GCN 1.0) and
# Sea Islands (GCN 2.x) GPUs. If you own one of these cards and want to use
# the modern amdgpu driver instead (required for Vulkan, Wayland, and modern
# compositors), uncomment BOTH lines below.
#
#   Southern Islands (si_support)  – HD 7700-7900, R7 250/260, R9 270/280
#   Sea Islands     (cik_support)  – R7 260X, R9 290/290X, R7 360, R9 380
#
# The first line tells amdgpu to claim these GPUs.
# The second line tells the radeon driver to release them.
# Both are needed — otherwise two drivers will fight over the same hardware.
#
# If you have Polaris (RX 400/500) or newer you do NOT need these.
#
#options amdgpu si_support=1 cik_support=1
#options radeon si_support=0 cik_support=0


###############################################################################
# VIRTUAL MEMORY – GPU page table and address space configuration
###############################################################################
#
# The GPU has its own virtual memory system, similar to how the CPU uses
# page tables to map virtual addresses to physical VRAM. These parameters
# control block sizes, fragmentation granularity, and total address space.
# Tuning these can reduce TLB (Translation Lookaside Buffer) misses and
# improve performance in memory-heavy workloads like gaming, 3D rendering,
# video editing, and machine learning.
#
#-----------------------------------------------------------------------------

# vm_block_size – Page table block size (bits)
#
#   Range:    9 – 15   (default varies by GPU generation)
#   Nordix:   14
#
#   Controls how large each block in the GPU page table is, expressed as
#   a power of two. A larger block means fewer page table lookups are
#   needed to resolve a virtual address, which reduces overhead.
#
#   2^14 = 16384 pages per block. This is aggressive but works well on
#   modern GPUs with large VRAM pools (8 GB+). It reduces page table
#   fragmentation and speeds up large buffer allocations.
#
#   Lower values (9-12) use less memory for page tables but cause more
#   frequent lookups. Only reduce this if you see out-of-memory issues
#   in the kernel log (dmesg | grep amdgpu).
#
options amdgpu vm_block_size=14


# vm_fragment_size – Minimum fragment size for VM allocations (bits)
#
#   Range:    4 – 14   (default varies by GPU generation)
#   Nordix:   9
#
#   Sets the smallest unit the GPU memory manager will work with when
#   mapping virtual pages. Larger fragments mean fewer entries in the
#   TLB, which means fewer TLB misses during texture sampling, buffer
#   reads, and shader memory access.
#
#   2^9 = 512 pages per fragment. Good balance for mixed workloads
#   (gaming + desktop compositing). Higher values (11-14) can help
#   workstation/compute workloads that allocate huge contiguous buffers,
#   but may waste memory for many small allocations.
#
options amdgpu vm_fragment_size=9


# vm_size – Total virtual address space per GPU process (GB)
#
#   Range:    32 – 1024   (default: 256)
#   Nordix:   512
#
#   The maximum virtual address space available to each GPU process.
#   IMPORTANT: This is virtual space, not physical VRAM. It does not
#   consume actual memory — it only defines how large the address
#   window is.
#
#   512 GB allows applications to map very large datasets without
#   running out of address space. Useful for:
#     - Games with high-res texture streaming (UE5, Star Citizen)
#     - Machine learning frameworks mapping large models
#     - Professional 3D applications (Blender, DaVinci Resolve)
#
#   There is almost no cost to setting this high. Reduce only if you
#   encounter compatibility issues with very old GPU applications.
#
options amdgpu vm_size=512


# vm_update_mode – How GPU page tables are updated
#
#   Values:   0 = CPU only
#             1 = GPU SDMA only
#             2 = CPU for small updates, GPU SDMA for large updates (hybrid)
#             3 = GPU compute for updates
#   Nordix:   2
#
#   Mode 2 (hybrid) lets the CPU handle small, quick page table changes
#   directly while offloading large bulk updates to the GPU's SDMA
#   (System DMA) engine. This prevents the CPU from stalling on large
#   remapping operations while keeping small updates fast and low-latency.
#
#   Mode 0 can be useful for debugging. Mode 1 offloads everything to
#   the GPU which frees CPU cycles but adds latency for small updates.
#
options amdgpu vm_update_mode=2


###############################################################################
# GPU SCHEDULER – Job scheduling and recovery
###############################################################################
#
# The GPU scheduler manages the queue of rendering and compute jobs sent
# to the GPU. These settings control which scheduling algorithm is used,
# how jobs are prioritized, and how the driver recovers from GPU hangs.
#
#-----------------------------------------------------------------------------

# scheduler – GPU job scheduling algorithm
#
#   Values:   0 = Round-robin across all rings
#             1 = FIFO (first in, first out)
#             2 = Priority-based scheduling
#   Nordix:   2
#
#   Priority-based scheduling (2) allows the driver to assign different
#   priority levels to different types of work. For example, display
#   compositing and cursor updates get high priority so your desktop
#   stays responsive, while background compute tasks get lower priority.
#
#   This is the best choice for desktop and gaming use where you want
#   the interactive workload (your game, your compositor) to always
#   take precedence over background GPU work.
#
#   Round-robin (0) gives every queue equal time — good for pure
#   compute clusters. FIFO (1) processes jobs strictly in order.
#
options amdgpu scheduler=2


# sched_job_policy – How individual jobs within a queue are selected
#
#   Values:   0 = Default kernel policy
#             1 = First-come, first-served
#             2 = Favor interactive/shorter jobs
#   Nordix:   2
#
#   Works together with the scheduler above. Policy 2 prioritizes
#   shorter, interactive jobs (like frame rendering) over longer
#   compute batches. This reduces input latency and frame pacing
#   stutter in games and compositors.
#
options amdgpu sched_job_policy=2


# gpu_recovery – Automatic recovery from GPU hangs
#
#   Values:   0 = Disabled (GPU hang = hard lock, requires reboot)
#             1 = Enabled  (driver resets the GPU and resumes)
#   Nordix:   1
#
#   When a GPU job takes too long (see lockup_timeout below), the
#   driver can reset the GPU hardware and restart the graphics
#   pipeline without rebooting the entire system.
#
#   This is essential for desktop use. A misbehaving game or shader
#   will cause a brief screen flicker instead of a complete lockup.
#   The application that caused the hang will usually crash, but your
#   desktop session survives.
#
#   Only disable this for GPU debugging/development where you need
#   the hang to be preserved for analysis.
#
options amdgpu gpu_recovery=1


# lockup_timeout – Time before a GPU job is considered hung (ms)
#
#   Range:    1000 – 60000+   (default: 10000)
#   Nordix:   10000 (10 seconds)
#
#   If a single GPU job runs for longer than this value without
#   completing, the driver assumes it is hung and triggers a GPU reset
#   (if gpu_recovery=1).
#
#   10000 ms (10 seconds) is generous enough to avoid false positives
#   from legitimate long-running shaders (heavy ray tracing, complex
#   compute) while still recovering from actual hangs reasonably fast.
#
#   Increase to 30000-60000 if you run very heavy compute workloads
#   (AI training, scientific simulation) that legitimately take a long
#   time per dispatch. Decrease to 5000 for a snappier recovery on a
#   pure gaming/desktop system.
#
options amdgpu lockup_timeout=10000


###############################################################################
# POWER & FEATURE CONTROL
###############################################################################

# ppfeaturemask – Power Play feature bitmask (hex)
#
#   Default:  Varies by driver version (conservative subset enabled)
#   Nordix:   0xffffffff (all bits set = all features enabled)
#
#   "Power Play" is AMD's dynamic power management system. It controls:
#     - Clock speed scaling (GPU and VRAM frequency adjustment)
#     - Voltage regulation and dynamic undervolting
#     - Fan curve control
#     - OverDrive overclocking interface
#     - Power limit adjustment
#     - Thermal throttling behavior
#
#   Setting this to 0xffffffff unlocks ALL Power Play features,
#   including manual overclocking and undervolting through sysfs:
#     /sys/class/drm/card0/device/pp_od_clk_voltage
#
#   This is required if you want to:
#     - Use CoreCtrl, LACT, or other GPU tuning tools
#     - Manually set fan curves
#     - Undervolt your GPU for cooler/quieter operation
#     - Overclock memory or core clocks
#
#   Without this, many tuning interfaces will appear but refuse
#   to accept changes. Safe to enable even if you never touch
#   overclocking — it only unlocks the interface, does not change
#   any clocks or voltages by itself.
#
options amdgpu ppfeaturemask=0xffffffff


# dcfeaturemask – Display Core feature bitmask (hex)
#
#   Default:  Varies by driver version
#   Nordix:   0xffffffff (all display features enabled)
#
#   Controls which features of the Display Core (DC) are enabled.
#   DC handles everything related to display output:
#     - FreeSync / Adaptive Sync
#     - HDR (High Dynamic Range) output
#     - DSC (Display Stream Compression) for high-res/high-refresh
#     - PSR (Panel Self Refresh) for power saving on eDP panels
#     - Multi-monitor configuration
#     - Color management and ICC profiles
#     - Hardware cursor planes
#
#   Setting all bits to 1 enables every display feature the hardware
#   supports. This is the recommended setting for desktop use since
#   it enables FreeSync, HDR, and all multi-monitor features.
#
#   Only mask bits off if you experience specific display issues
#   (e.g., flickering with FreeSync on certain monitors).
#
options amdgpu dcfeaturemask=0xffffffff


# dc – Enable/disable Display Core Next (DCN)
#
#   Values:   0 = Disabled (use legacy display code)
#             1 = Enabled  (use modern DCN display engine)
#   Nordix:   1
#
#   DCN is AMD's modern display engine, required for:
#     - Wayland compositors (Hyprland, Sway, KDE Plasma 6)
#     - FreeSync / Adaptive Sync
#     - HDR output
#     - Proper multi-monitor with mixed refresh rates
#     - Hardware-accelerated compositing
#
#   There is almost never a reason to disable this on a modern system.
#   The only exception is debugging display issues where you want to
#   rule out DCN as the cause.
#
#   NOTE: On Vega and newer GPUs, dc=1 is the default and the legacy
#   path may not even work. On older Polaris cards, enabling DC
#   unlocks FreeSync support.
#
options amdgpu dc=1


# exp_hw_support – Experimental hardware support
#
#   Values:   0 = Disabled (only officially supported GPUs)
#             1 = Enabled  (allow driver to probe unreleased hardware)
#   Nordix:   1
#
#   Allows the amdgpu driver to attempt to drive GPUs that are not yet
#   officially supported in the current kernel version. The driver will
#   try to match the GPU to the closest known chip and load firmware.
#
#   This is useful when:
#     - A new GPU launches before the kernel adds official support
#     - Running a slightly older kernel with a brand-new card
#     - Testing pre-release GPU silicon
#
#   On already-supported hardware this has no effect. Safe to leave
#   enabled — the driver will simply ignore it for known GPUs.
#
options amdgpu exp_hw_support=1


###############################################################################
# MEMORY MANAGEMENT
###############################################################################

# noretry – Disable retry on GPU page faults
#
#   Values:   0 = Retry page faults (GPU stalls and waits for the page)
#             1 = No retry (fail immediately on page fault)
#   Nordix:   1
#
#   When the GPU accesses a virtual address that is not currently mapped
#   to physical memory, a "page fault" occurs. With retry enabled (0),
#   the GPU stalls and waits for the kernel to map the page — this can
#   cause micro-stutter and latency spikes.
#
#   With noretry=1, the page fault is treated as an error and the
#   allocation must be fully mapped before the GPU accesses it. This
#   forces the driver to be more proactive about memory management
#   and eliminates GPU-side stalls from page faults.
#
#   Best for gaming and interactive workloads where consistent frame
#   timing matters more than memory overcommitment flexibility.
#
#   Set to 0 if you need GPU memory oversubscription (using more
#   virtual memory than physical VRAM, common in compute/AI workloads
#   where the driver pages data in and out).
#
options amdgpu noretry=1


# gttsize – GTT (Graphics Translation Table) size in MB
#
#   Range:    256 – 16384+   (default: auto, typically ~50% of system RAM)
#   Nordix:   2048 (2 GB)
#
#   GTT is a region of system RAM that the GPU can access directly via
#   PCIe. It acts as overflow/staging memory when VRAM is full or when
#   data needs to be shared between CPU and GPU.
#
#   Common uses of GTT memory:
#     - Texture uploads before they are copied to VRAM
#     - Vertex/index buffers shared between CPU and GPU
#     - Command buffers and indirect dispatch arguments
#     - Fallback when VRAM is exhausted
#
#   2048 MB provides generous staging space without consuming too much
#   system RAM. Increase to 4096-8192 if you:
#     - Use GPU compute with large CPU<->GPU data transfers
#     - Run games that exceed VRAM (textures spill to GTT)
#     - Use multi-GPU setups
#
#   Decrease if your system has limited RAM (8 GB or less).
#
options amdgpu gttsize=2048


###############################################################################
# RUNTIME POWER MANAGEMENT
###############################################################################

# runpm – Runtime power management (dynamic GPU power off)
#
#   Values:   0 = Disabled (GPU stays fully powered at all times)
#             1 = Enabled  (GPU can power down when idle)
#            -1 = Auto     (kernel decides based on platform)
#   Nordix:   0
#
#   When enabled, the GPU can enter a deep sleep state (D3cold) when
#   no displays are connected to it and no applications are using it.
#   This is primarily useful for laptops with hybrid graphics
#   (AMD iGPU + AMD dGPU or AMD + NVIDIA) where the discrete GPU
#   should power off to save battery.
#
#   Disabled (0) for Nordix because:
#     - Desktop systems: The GPU is always in use for display output,
#       so runtime PM never triggers anyway.
#     - Stability: Some GPUs have firmware bugs that cause hangs or
#       black screens when waking from D3cold.
#     - Latency: Re-powering the GPU takes time and can cause a brief
#       stutter when an application first accesses the GPU.
#
#   Enable (1) only on laptops where battery life is critical and
#   you have confirmed your GPU wakes from D3cold reliably.
#
options amdgpu runpm=0


# npt – Nested Page Table passthrough (for virtualization)
#
#   Values:   0 = Disabled
#             1 = Enabled
#   Nordix:   0
#
#   Nested Page Tables allow a virtual machine to directly access the
#   GPU's page tables, bypassing the hypervisor for address translation.
#   This is part of AMD-Vi / IOMMU GPU passthrough (VFIO).
#
#   Disabled (0) because this is a bare-metal desktop configuration.
#   Enabling NPT on a bare-metal system has no benefit and may cause
#   subtle memory management issues.
#
#   Enable (1) only if you are passing the GPU through to a virtual
#   machine using VFIO/KVM and need optimal VM GPU performance.
#
options amdgpu npt=0


###############################################################################
# AUDIO
###############################################################################

# audio – HDMI/DisplayPort audio output
#
#   Values:   0 = Disabled (no audio over HDMI/DP)
#             1 = Enabled  (GPU provides audio device for HDMI/DP)
#   Nordix:   1
#
#   When enabled, the GPU registers an audio device that can output
#   sound through HDMI and DisplayPort connections. This audio device
#   appears in PipeWire/PulseAudio as an additional sound card.
#
#   Required if you:
#     - Connect your PC to a TV or monitor with built-in speakers
#     - Use an HDMI/DP audio extractor to a sound system
#     - Use a VR headset connected via DisplayPort
#
#   Safe to leave enabled even if you use a dedicated sound card or
#   USB audio — it simply adds an extra audio device that you can
#   ignore. Disable only if the extra audio device causes confusion
#   in your audio setup or interferes with automatic device selection.
#
options amdgpu audio=1


###############################################################################
# DEBUGGING
###############################################################################

# debug – Driver debug output level
#
#   Values:   0 = Disabled (no extra debug output)
#             1 = Enabled  (verbose logging to kernel ring buffer)
#   Nordix:   0
#
#   When enabled, the amdgpu driver outputs detailed diagnostic
#   information to the kernel log (readable with dmesg or journalctl).
#   This includes memory allocation details, fence signaling, ring
#   buffer state, power management transitions, and more.
#
#   Keep disabled (0) for normal use. The debug output is extremely
#   verbose and can:
#     - Fill up /var/log quickly
#     - Slow down the system due to excessive logging
#     - Make it harder to find real errors in dmesg
#
#   Enable temporarily (set to 1 and reboot) when diagnosing:
#     - GPU hangs or resets
#     - Display output failures
#     - VRAM allocation errors
#     - Driver crashes
#
#   To read debug output:   sudo dmesg | grep amdgpu
#   Or live monitoring:     sudo dmesg -w | grep amdgpu
#
options amdgpu debug=0


###############################################################################
#                                                                             #
#  QUICK REFERENCE TABLE                                                      #
#                                                                             #
#  Parameter          Nordix Value   What It Does                             #
#  ─────────────────  ────────────   ─────────────────────────────────────    #
#  vm_block_size      14             Large page table blocks (performance)    #
#  vm_fragment_size   9              Medium fragment granularity              #
#  vm_size            512            512 GB virtual address space per proc    #
#  vm_update_mode     2              Hybrid CPU+SDMA page table updates       #
#  scheduler          2              Priority-based GPU job scheduling        #
#  sched_job_policy   2              Favor interactive/shorter jobs           #
#  gpu_recovery       1              Auto-reset GPU on hang                   #
#  lockup_timeout     10000          10 sec before declaring a hang           #
#  ppfeaturemask      0xffffffff     All power/clock features unlocked        #
#  dcfeaturemask      0xffffffff     All display features unlocked            #
#  dc                 1              Modern display engine (DCN) enabled      #
#  exp_hw_support     1              Allow probing unreleased GPUs            #
#  noretry            1              No GPU page fault retries (low latency)  #
#  gttsize            2048           2 GB system RAM for GPU staging          #
#  runpm              0              No runtime power-off (desktop stability) #
#  npt                0              No nested page tables (bare-metal)       #
#  audio              1              HDMI/DP audio enabled                    #
#  debug              0              No debug logging (clean dmesg)           #
#                                                                             #
###############################################################################


###############################################################################
#                                                                             #
#  USEFUL COMMANDS                                                            #
#                                                                             #
#  Check current value of any parameter:                                      #
#    cat /sys/module/amdgpu/parameters/ppfeaturemask                          #
#                                                                             #
#  List ALL amdgpu parameters and their current values:                       #
#    for f in /sys/module/amdgpu/parameters/*; do                             #
#      echo "$(basename $f) = $(cat $f 2>/dev/null)"; done                    #
#                                                                             #
#  Check GPU power states and clocks:                                         #
#    cat /sys/class/drm/card0/device/pp_od_clk_voltage                        #
#                                                                             #
#  Monitor GPU temperature:                                                   #
#    watch -n1 sensors | grep -A5 amdgpu                                      #
#                                                                             #
#  Check VRAM usage:                                                          #
#    cat /sys/class/drm/card0/device/mem_info_vram_used                       #
#    cat /sys/class/drm/card0/device/mem_info_vram_total                      #
#                                                                             #
#  View GPU ring buffer / scheduler status:                                   #
#    sudo cat /sys/kernel/debug/dri/0/amdgpu_gpu_recover                      #
#                                                                             #
#  Check if FreeSync is active:                                               #
#    for c in /sys/class/drm/card0-*/vrr_capable; do                          #
#      echo "$c: $(cat $c)"; done                                             #
#                                                                             #
###############################################################################
