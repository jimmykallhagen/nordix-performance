###############################################################################
#                                                                             #
#                     Nordix Intel GPU Configuration                          #
#                                                                             #
#  File:      /etc/modprobe.d/intel.conf                                      #
#  Purpose:   Kernel module parameters for Intel graphics drivers             #
#  Applies:   Intel HD/UHD/Iris (i915) and Intel Arc (xe)                     #
#                                                                             #
#  Drivers:   This file configures two kernel modules:                        #
#               i915 – Integrated GPUs: HD, UHD, Iris (Gen3 through Gen12)    #
#               xe   – Intel Arc discrete GPUs and future iGPUs (Gen12.5+)    #
#                                                                             #
#  After making changes you must either:                                      #
#    1. Reboot the system, OR                                                 #
#    2. Rebuild initramfs (sudo mkinitcpio -P) and then reboot                #
#       (required if i915 is loaded from initramfs via MODULES=())            #
#                                                                             #
#  To verify a parameter is active after reboot:                              #
#    cat /sys/module/i915/parameters/<parameter_name>                         #
#                                                                             #
#  To list ALL available parameters with descriptions:                        #
#    modinfo -p i915                                                          #
#    modinfo -p xe                                                            #
#                                                                             #
#  NOTE: Many i915 parameters default to -1, which means "use the per-chip    #
#        default decided by the driver". This is usually the safest choice.   #
#        Overriding these marks the kernel as "tainted", meaning the driver   #
#        developers consider non-default values experimental and unsupported. #
#        Nordix sets values that are broadly tested and safe for desktop use. #
#                                                                             #
#  WARNING: Incorrect values may cause display corruption, freezes, or        #
#           failure to boot into a graphical session. Change one parameter    #
#           at a time and test before proceeding.                             #
#                                                                             #
###############################################################################


###############################################################################
# i915 – Integrated Graphics (HD, UHD, Iris)
###############################################################################
#
# The i915 driver handles all Intel integrated GPUs from the 900-series
# chipsets through 12th/13th Gen (Alder Lake / Raptor Lake). This covers
# the vast majority of Intel laptops and desktops with integrated graphics.
#
#=============================================================================
# FIRMWARE LOADING
#=============================================================================

# enable_guc – GuC (Graphics Micro Controller) and HuC firmware loading
#
#   Values:   -1 = Auto (driver decides per GPU generation)
#              0 = Disabled (no GuC, no HuC)
#              1 = GuC submission only
#              2 = HuC loading only (GuC loads as dependency)
#              3 = Both GuC submission and HuC loading
#   Nordix:   3
#
#   The GuC is a microcontroller embedded in the GPU that can manage
#   workload submission and scheduling, replacing software scheduling
#   on the CPU. The HuC (HEVC/H.265 micro Controller) provides
#   hardware-accelerated media decode authentication.
#
#   GuC submission (1 or 3):
#     - Offloads GPU job scheduling from the CPU to the GuC
#     - Can reduce scheduling latency and CPU overhead
#     - Improves performance for multi-queue workloads
#     - Supported and beneficial on Gen9+ (Skylake and newer)
#     - Required on Gen12+ (Tiger Lake+) where the driver enables
#       GuC submission by default
#
#   HuC loading (2 or 3):
#     - Required for hardware-authenticated HEVC/H.265 decode
#     - Needed for some DRM-protected media playback
#     - The HuC firmware is loaded via the GuC, so enabling HuC
#       implicitly loads the GuC firmware too
#
#   Value 3 enables both and provides the best combination of
#   performance and media capability.
#
#   NOTE: On Gen9 (Skylake, Kaby Lake), an Intel developer has
#   warned that GuC submission is "completely unsupported" and may
#   cause crashes. Use enable_guc=2 (HuC only) on these older GPUs
#   if you experience instability. On Gen11+ (Ice Lake and newer),
#   GuC submission is stable and recommended.
#
#   Firmware files must be present in /usr/lib/firmware/i915/.
#   On Arch Linux, these are provided by the "linux-firmware" package.
#
options i915 enable_guc=3


#=============================================================================
# DISPLAY POWER SAVING
#=============================================================================

# enable_fbc – Frame Buffer Compression
#
#   Values:   -1 = Auto (per-chip default)
#              0 = Disabled
#              1 = Enabled
#   Nordix:   1
#
#   FBC compresses the framebuffer in memory, reducing the bandwidth
#   needed to refresh the display. Since the display is redrawn many
#   times per second (60-165 Hz), even modest compression saves
#   significant memory bandwidth and power.
#
#   Benefits:
#     - Lower power consumption (especially on laptops)
#     - Reduced memory bus traffic (frees bandwidth for other GPU work)
#     - Zero visual quality impact (lossless compression)
#
#   FBC is supported on almost all Intel GPUs from Ironlake (2010)
#   onward. It is safe to enable broadly. The driver auto-enables it
#   on many platforms already (-1), but setting 1 forces it on for
#   platforms where auto-detection might be conservative.
#
#   Disable only if you see visual artifacts (rare, mostly reported
#   on very old Ironlake/Sandy Bridge hardware).
#
options i915 enable_fbc=1


# enable_psr – Panel Self Refresh
#
#   Values:   -1 = Auto (per-chip default)
#              0 = Disabled
#              1 = Enabled (PSR1)
#              2 = Enabled (PSR1 + PSR2 where supported)
#   Nordix:   1
#
#   Panel Self Refresh allows an eDP (embedded DisplayPort) panel —
#   i.e., a laptop's built-in display — to refresh itself from a
#   local frame buffer on the panel, without the GPU continuously
#   sending pixel data.
#
#   When the screen content is static (no animations, no cursor
#   movement), the GPU can effectively go idle while the panel keeps
#   displaying the same image from its own memory.
#
#   Benefits:
#     - Significant power savings on laptops (display is one of the
#       largest power consumers)
#     - GPU can enter deeper idle states more frequently
#
#   PSR1 is well-supported and stable on most modern panels. PSR2
#   (value 2) adds selective update capability (only changed regions
#   are refreshed) for even more power savings but can cause
#   flickering on some displays.
#
#   NOTE: PSR only applies to eDP panels (laptop built-in screens).
#   It has zero effect on external monitors connected via HDMI/DP.
#
#   If you experience screen flickering, brief white flashes, or
#   cursor trail artifacts on a laptop, try disabling PSR (set to 0).
#   These issues are well-documented for certain panel models.
#
options i915 enable_psr=1


# enable_dc – Display power-saving C-states
#
#   Values:   -1 = Auto (per-chip default)
#              0 = Disabled (display hardware stays fully powered)
#              1 = Up to DC5 (moderate power saving)
#              2 = Up to DC6 (deep power saving, display engine off)
#   Default:  -1
#
#   Display C-states allow the display engine within the GPU to enter
#   progressively deeper power-saving modes when the display is idle.
#
#   DC5: Display clocks are gated, significant power saving while
#        maintaining fast wake-up (~microseconds).
#   DC6: Display engine is fully powered down. Maximum power saving
#        but slower wake-up. Can cause brief flicker on wake.
#
#   The default (-1) is safe for most systems. Uncomment and set to
#   0 if you experience random system hangs, especially on:
#     - Intel Baytrail (Atom) processors
#     - Kaby Lake Refresh systems
#     - Goldmont (Celeron/Pentium) systems
#
#   These chipsets have known hardware bugs related to DC states that
#   can cause complete system freezes.
#
#options i915 enable_dc=-1


#=============================================================================
# BOOT AND DISPLAY INITIALIZATION
#=============================================================================

# fastboot – Skip unnecessary mode setting at boot
#
#   Values:   -1 = Auto (per-chip default)
#              0 = Disabled (driver re-initializes display from scratch)
#              1 = Enabled  (driver reuses BIOS/firmware display settings)
#   Nordix:   1
#
#   When enabled, the i915 driver attempts to inherit the display mode
#   set by the BIOS/UEFI firmware during POST, instead of performing a
#   full mode set. This avoids the brief screen flicker/blackout
#   during the transition from firmware to the kernel graphics driver.
#
#   Benefits:
#     - Smoother, flicker-free boot experience
#     - Slightly faster boot time (saves ~100-200ms of mode setting)
#     - Seamless transition from bootloader splash to login screen
#
#   This works best with UEFI boot and a firmware that sets a
#   reasonable display mode. On legacy BIOS systems the benefit is
#   minimal.
#
#   Safe to enable on all modern Intel platforms.
#
options i915 fastboot=1


# nuclear_pageflip – Atomic page flip support
#
#   Values:   0 = Disabled (use legacy page flip path)
#             1 = Enabled  (use atomic modesetting for page flips)
#   Nordix:   1
#
#   Enables the atomic modesetting API for page flips, which is the
#   modern kernel interface used by Wayland compositors for display
#   updates. "Nuclear" refers to the atomic nature of the operation —
#   all display changes (resolution, plane position, gamma, etc.) are
#   applied in a single commit, either all succeeding or all failing.
#
#   Required for:
#     - Proper tear-free rendering under Wayland compositors
#     - Multi-plane compositing (hardware overlays)
#     - Adaptive sync / variable refresh rate on eDP
#     - Efficient compositor rendering with fewer GPU copies
#
#   On modern kernels (5.x+), this is generally enabled by default
#   for supported platforms, but we set it explicitly for consistency.
#
#   Safe to enable on all Intel GPUs that support i915.
#
options i915 nuclear_pageflip=1


#=============================================================================
# GPU RECOVERY AND HANG DETECTION
#=============================================================================

# reset – GPU reset behavior on hang
#
#   Values:   0 = Disabled (GPU hang = hard lock, requires reboot)
#             1 = Full GPU reset (reset entire GPU on hang)
#             2 = Engine reset (reset only the hung engine, keep others running)
#   Default:  2
#
#   Engine reset (2) is the most surgical option: if the 3D engine
#   hangs, only that engine is reset while the video decode engine
#   and display engine continue running. This means a shader bug in a
#   game will kill that game but not your video playback or display.
#
#   Full GPU reset (1) resets everything, which is more disruptive but
#   more reliable at recovering from severe hangs.
#
#   The default (2) is correct for almost all users.
#
#   Disable (0) only for GPU debugging where you need the hang state
#   preserved for analysis.
#
#options i915 reset=2


# enable_hangcheck – Periodic GPU activity monitoring
#
#   Values:   true  = Enabled (check for GPU hangs periodically)
#             false = Disabled (no hang detection)
#   Default:  true
#
#   The hang checker periodically tests whether the GPU is making
#   progress. If a GPU engine appears stuck for too long, the driver
#   triggers a reset (see reset= above) to recover.
#
#   WARNING: Disabling this can cause SYSTEM WIDE HANGS if the GPU
#   locks up. The only time to disable it is for GPU compute workloads
#   that legitimately run very long shaders (e.g., OpenCL, Intel
#   compute stack) where the 4-second default timeout is too short.
#
#   For compute workloads, Intel recommends disabling via kernel
#   parameter: i915.enable_hangcheck=0
#
#options i915 enable_hangcheck=true


#=============================================================================
# ADDITIONAL DISPLAY OPTIONS
#=============================================================================

# enable_dp_mst – DisplayPort Multi-Stream Transport
#
#   Values:   true  = Enabled (support DP daisy-chaining and MST hubs)
#             false = Disabled
#   Default:  true
#
#   Multi-Stream Transport allows a single DisplayPort connection to
#   drive multiple displays through a daisy chain or MST hub. This is
#   commonly used with:
#     - Thunderbolt docks with multiple monitor outputs
#     - DisplayPort daisy-chaining between monitors
#     - USB-C/Thunderbolt to dual-HDMI adapters
#
#   Enabled by default. Disable only if MST is causing detection
#   issues with a single external monitor.
#
#options i915 enable_dp_mst=true


# enable_dpcd_backlight – DPCD backlight control for eDP panels
#
#   Values:   -1 = Auto (use per-VBT setting)
#              0 = Disabled (use PWM backlight control)
#              1 = Enabled  (use DPCD AUX backlight control)
#   Default:  -1
#
#   Modern laptop panels support backlight brightness control over the
#   DisplayPort AUX channel (DPCD method) instead of the legacy PWM
#   (Pulse Width Modulation) method.
#
#   DPCD backlight advantages:
#     - Flicker-free dimming (no PWM frequency issues)
#     - Finer brightness granularity
#     - Required for HDR backlight control on some panels
#
#   If your laptop's brightness keys work but the backlight flickers
#   at low brightness, try enabling this (1). If brightness control
#   stops working entirely, set back to -1 or 0.
#
#options i915 enable_dpcd_backlight=-1


#=============================================================================
# POWER MANAGEMENT (ADVANCED)
#=============================================================================

# disable_power_well – Display power well control
#
#   Values:   -1 = Auto (per-chip default)
#              0 = Power wells always on (maximum stability)
#              1 = Power wells disabled when possible (power saving)
#   Default:  -1
#
#   The display hardware is divided into "power wells" — groups of
#   circuits that can be independently powered down. For example, if
#   only one display output is active, the power wells for unused
#   outputs can be shut off.
#
#   Auto (-1) is safe and recommended. Set to 0 if you experience
#   display output detection failures on specific ports.
#
#options i915 disable_power_well=-1


# enable_ips – Intermediate Pixel Storage (Haswell only)
#
#   Values:   0 = Disabled
#             1 = Enabled
#   Default:  1 (on Haswell)
#
#   IPS is a power-saving feature specific to Intel Haswell (4th Gen)
#   that reduces display power by storing intermediate pixel data more
#   efficiently. Only relevant for Haswell systems.
#
#   On non-Haswell platforms this parameter is ignored.
#
#options i915 enable_ips=1


#=============================================================================
# DEVELOPMENT / DEBUGGING (not for normal use)
#=============================================================================

# error_capture – Record GPU state after a hang
#
#   Values:   true  = Enabled (capture GPU state to /sys/class/drm/card*/error)
#             false = Disabled
#   Default:  true
#
#   When the GPU hangs, the driver captures the full GPU state
#   (registers, ring buffers, batch buffers) and makes it available
#   via sysfs for debugging. This data is essential for filing
#   useful bug reports to the i915 developers.
#
#   Keep enabled. The performance impact is zero during normal
#   operation (only triggers on hang, which should be rare).
#
#options i915 error_capture=true


# guc_log_level – GuC firmware logging verbosity
#
#   Values:   -1 = Auto
#              0 = Disabled
#              1 = Minimal logging
#              4 = Maximum verbosity
#   Default:  -1
#
#   Controls how much log output the GuC firmware generates. Only
#   useful for driver developers debugging GuC issues. Higher values
#   generate significant log traffic and impact performance.
#
#options i915 guc_log_level=-1


# verbose_state_checks – Enable verbose WARN_ON() logs
#
#   Values:   true  = Enabled (log warnings on unexpected HW state)
#             false = Disabled
#   Default:  true
#
#   Produces detailed kernel log messages when the driver encounters
#   unexpected hardware state. Useful for debugging but produces
#   noisy dmesg output. Leave enabled for bug reporting.
#
#options i915 verbose_state_checks=true


###############################################################################
# xe – Intel Arc and Future Discrete/Integrated GPUs
###############################################################################
#
# The "xe" driver is the next-generation Intel GPU driver, replacing i915
# for newer hardware. It supports:
#   - Intel Arc discrete GPUs (A380, A580, A750, A770)
#   - Integrated GPUs starting from Lunar Lake / Battlemage
#   - Future Intel GPU architectures
#
# The xe driver is significantly newer than i915 and has fewer tunable
# parameters. Most settings are automatically configured based on the
# detected GPU.
#
# The xe driver is included in mainline Linux kernels starting from 6.8
# as an experimental option. From kernel 6.10+ it is the default for
# Intel Arc GPUs on many distributions.
#
#-----------------------------------------------------------------------------

# force_probe – Force the xe driver to claim specific GPU PCI IDs
#
#   Values:   * = Probe all supported devices
#             <PCI_ID> = Probe a specific device (e.g., "56a0")
#   Default:  (only officially supported GPUs are probed)
#
#   If your Intel Arc GPU is not automatically detected by the xe
#   driver (i.e., no /dev/dri/cardN appears for it), you can force
#   the driver to attempt to claim it by PCI ID.
#
#   Use "*" to force-probe all recognized Intel GPUs, or specify a
#   single PCI device ID for targeted probing.
#
#   Find your GPU's PCI ID with: lspci -nn | grep -i vga
#   The ID is the 4-character hex code in brackets, e.g. [8086:56a0]
#   → use "56a0"
#
#   Only needed if the GPU is too new for the current kernel's xe
#   driver and you want to test experimental support.
#
#options xe force_probe=*


###############################################################################
#                                                                             #
#  QUICK REFERENCE TABLE                                                      #
#                                                                             #
#  Driver  Parameter          Nordix    Effect                                #
#  ──────  ─────────────────  ────────  ──────────────────────────────────    #
#  i915    enable_guc         3         GuC submission + HuC loading          #
#  i915    enable_fbc         1         Framebuffer compression (power save)  #
#  i915    enable_psr         1         Panel Self Refresh (laptop power)     #
#  i915    fastboot           1         Flicker-free boot                     #
#  i915    nuclear_pageflip   1         Atomic modesetting for Wayland        #
#                                                                             #
###############################################################################


###############################################################################
#                                                                             #
#  USEFUL COMMANDS                                                            #
#                                                                             #
#  Check current value of any i915 parameter:                                 #
#    cat /sys/module/i915/parameters/enable_guc                               #
#                                                                             #
#  List ALL i915 parameters and their current values:                         #
#    for f in /sys/module/i915/parameters/*; do                               #
#      echo "$(basename $f) = $(cat $f 2>/dev/null)"; done                    #
#                                                                             #
#  List all available parameters with descriptions:                           #
#    modinfo -p i915                                                          #
#    modinfo -p xe                                                            #
#                                                                             #
#  Check which driver is in use:                                              #
#    lspci -k | grep -A3 VGA                                                  #
#                                                                             #
#  Check GPU frequency and power:                                             #
#    sudo intel_gpu_top               (from intel-gpu-tools package)          #
#                                                                             #
#  Check GuC/HuC firmware status:                                             #
#    sudo cat /sys/kernel/debug/dri/0/gt/uc/guc_info                          #
#    sudo cat /sys/kernel/debug/dri/0/gt/uc/huc_info                          #
#                                                                             #
#  Check available firmware files:                                            #
#    ls /usr/lib/firmware/i915/                                               #
#    ls /usr/lib/firmware/xe/                                                 #
#                                                                             #
#  Monitor GPU usage in real time:                                            #
#    sudo intel_gpu_top                                                       #
#                                                                             #
#  Check FreeSync / Adaptive Sync on Intel:                                   #
#    for c in /sys/class/drm/card0-*/vrr_capable; do                          #
#      echo "$c: $(cat $c)"; done                                             #
#                                                                             #
#  Read GPU error state after a hang:                                         #
#    cat /sys/class/drm/card0/error                                           #
#                                                                             #
###############################################################################
