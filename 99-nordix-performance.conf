##============================================================================##
 #                         DIRTY PAGE MANAGEMENT                              #
##============================================================================##
#
# Dirty pages = modified data waiting to be written to disk.
# Larger buffers = fewer write interruptions = smoother gaming.
# Trade-off: More data at risk if system crashes before flush.
#
# NOTE: Nordix uses _ratio instead of _bytes so this configuration
#       works on any system RAM size without modification.
#       When both _bytes and _ratio are set, _bytes takes precedence.
#       Ensure vm.dirty_bytes and vm.dirty_background_bytes are NOT set
#       elsewhere, or they will override these ratio values.
#
#
#
#
# vm.dirty_ratio
# ──────────────────────────────────────────────────────────────────────────────
# Maximum dirty pages before process is forced to write (% of total RAM).
# When a process generates this much dirty data, it must stop and flush.
#
# * Linux Default: 20
# * Nordix defautl: 6
#
# This scales automatically with system RAM:
#    8 GB →  ~500 MB dirty buffer
#   16 GB →  ~1.0 GB dirty buffer
#   32 GB →  ~2.0 GB dirty buffer
#   64 GB →  ~4.0 GB dirty buffer
#  128 GB →  ~8.0 GB dirty buffer
#
# Conservative: 10  (small buffer, frequent flushes)
# Balanced:     20  (kernel default)
# Aggressive:    6  (Nordix — large enough buffer, bounded risk)
#
# NOTE: When both _bytes and _ratio are set, _bytes takes precedence.
#       Nordix uses _ratio so the config works on any RAM size.

vm.dirty_ratio = 6
#
#
#
#
# vm.dirty_background_ratio
# ──────────────────────────────────────────────────────────────────────────────
# Threshold where background flusher threads start writing (% of total RAM).
# Below this, no background writes. Above this, gradual flushing begins.
#
# * Linux Default: 10
# * Nordix defautl: 2
#
# This scales automatically with system RAM:
#    8 GB →  ~160 MB background threshold
#   16 GB →  ~320 MB background threshold
#   32 GB →  ~640 MB background threshold
#   64 GB →  ~1.3 GB background threshold
#  128 GB →  ~2.6 GB background threshold
#
# Rule of thumb: Set to ~1/3 of dirty_ratio.
# Too close to dirty_ratio = flushers start too late.
# Too low = constant unnecessary background I/O.

vm.dirty_background_ratio = 2
#
#
#
#
# vm.dirty_writeback_centisecs
# ──────────────────────────────────────────────────────────────────────────────
# How often the flusher threads wake up to check for dirty pages (in 1/100s).
#
# * Linux Default: 500 (5 seconds)
# * Nordix Default: 2500 (25 seconds)
# * Lower = more frequent checks = more I/O overhead
# * Higher = less overhead but data sits in RAM longer
#
# Conservative: 500  (5s)
# Balanced:     1500 (15s)
# Aggressive:   3000 (30s)

vm.dirty_writeback_centisecs = 2500
#
#
#
#
# vm.dirty_expire_centisecs
# ──────────────────────────────────────────────────────────────────────────────
# How old dirty data must be before flusher considers it for writing (1/100s).
#
# * Linux Default: 3000 (30 seconds)
# * Nordix Default: 6000 (60 seconds)
# * Higher = data stays in RAM longer before being written
#
# Conservative: 3000 (30s)
# Aggressive:   6000 (60s)

vm.dirty_expire_centisecs = 6000
#
#
#

##============================================================================##
#                          VFS CACHE MANAGEMENT                               #
##============================================================================##
#
#
# vm.vfs_cache_pressure
# ──────────────────────────────────────────────────────────────────────────────
# Controls tendency to reclaim inode/dentry cache vs page cache.
# Lower = keep directory/file metadata cached longer.
#
# Linux Default: 100
# Nordix Default 20
# 0   = never reclaim (can cause memory issues)
# 1   = almost never reclaim (extreme caching)
# 50  = prefer keeping cache
# 100 = balanced
# 200 = aggressively reclaim
#
# For gaming: keep assets cached as long as possible

vm.vfs_cache_pressure = 20
#
#
#

##============================================================================##
#                          MEMORY OVERCOMMIT                                  #
##============================================================================##
#
#
# vm.overcommit_memory
# ──────────────────────────────────────────────────────────────────────────────
# Controls how kernel handles memory allocation requests.
#
# Default: 0
# 0 = Heuristic: kernel guesses if enough memory (can deny allocations)
# 1 = Always allow: never deny allocations (programs allocate freely)
# 2 = Strict: only allow up to overcommit_ratio % of RAM
#
# For no-swap extreme systems: 1 lets applications allocate without checks.
# You have 64GB, let programs use it without kernel second-guessing.

vm.overcommit_memory = 0
#
#
#
# vm.overcommit_ratio
# ──────────────────────────────────────────────────────────────────────────────
# Only used when overcommit_memory = 2.
# Percentage of RAM that can be allocated.
#
# Default: 50
# With overcommit_memory = 1, this is ignored.

vm.overcommit_ratio = 98
#
#
#

##============================================================================##
 #                             SWAP SETTINGS                                  #
##============================================================================##

#     ##==================================================##
#      # Nordix dont use swap as defult on 32gb + sytems  #
#      # Nordix dont use oomd                             #
#      # Nordix follws the laws of Performance            #
#     ##==================================================##
#
#  ##=======================================================================================##
#   # oomd,zram and swap is only for the system that dosent have the correct amount of RAM  #  
#  ##=======================================================================================##
#
#
#
# vm.swappiness
# ──────────────────────────────────────────────────────────────────────────────
# Tendency to swap out memory vs dropping file cache.
# Irrelevant without swap, but set to 0 for clarity.
#
# Default: 60
# 0     = only swap to avoid OOM
# 1-30  = minimal swapping
# 60    = balanced
# 100   = swap and cache equally weighted
# 100+  = with ZRAM, prefer compressing to RAM over dropping cache
#
# No swap on this system = set to 0

vm.swappiness = 0
#
#
#
#
# vm.page-cluster
# ──────────────────────────────────────────────────────────────────────────────
# Pages read from swap in a single attempt (2^n pages).
# Irrelevant without swap.
#
# Default: 3 (8 pages)
# 0 = 1 page (best for SSD/ZRAM)
# 1 = 2 pages
# 2 = 4 pages
# 3 = 8 pages (better for HDD)

vm.page-cluster = 0
#
#
#

##============================================================================##
 #                         MEMORY FRAGMENTATION                               #
##============================================================================##
#
#
# vm.extfrag_threshold
# ──────────────────────────────────────────────────────────────────────────────
# Controls when kernel compacts memory to reduce fragmentation.
#
# Default: 500
# 0-500  = allow fragmentation (less CPU overhead)
# 500+   = compact more aggressively

vm.extfrag_threshold = 400
#
#
#
#
# vm.compaction_proactiveness
# ──────────────────────────────────────────────────────────────────────────────
# How proactively kernel compacts memory in background.
#
# Default: 20
# 0   = disable proactive compaction (less CPU overhead)
# 100 = maximum proactive compaction
#
# For gaming: disable to avoid random CPU spikes

vm.compaction_proactiveness = 10
#
#
#
#
# vm.page_lock_unfairness
# ──────────────────────────────────────────────────────────────────────────────
# Allows page lock stealing for better throughput.
#
# Default: 5
# Higher = more unfairness allowed = better throughput

vm.page_lock_unfairness = 5
#
#
#

##============================================================================##
 #                               HUGEPAGES                                    #
##============================================================================##
#
# HugePages = larger memory pages (2MB vs 4KB default).
# Benefits: Reduced TLB misses, faster memory access for large allocations.
# Used by: Games, emulators, VMs, databases.
#
# NOTE: This memory is RESERVED and unavailable for normal use!
#
#
#
# vm.nr_hugepages
# ──────────────────────────────────────────────────────────────────────────────
# Number of 2MB hugepages to reserve at boot.
#
# Default: 0
# Use nordix-perormance-launcher instad,
# it enable to tmp set hugepage when you start a program
#

# vm.nr_hugepages = 0
#
#
#
#
# vm.hugetlb_shm_group
# ──────────────────────────────────────────────────────────────────────────────
# GID allowed to create hugetlb shared memory segments.
#
# Default: 0 (only root)
# Set to your user's GID to allow hugepage usage.
# Find your GID: id -g

vm.hugetlb_shm_group = 1000
#
#
#

##============================================================================##
 #                         KERNEL WATCHDOGS                                   #
##============================================================================##
#
# Watchdogs monitor system health but consume CPU cycles.
# For extreme performance: disable them all.
# WARNING: System hangs will not trigger automatic reboot.
#
#
# kernel.nmi_watchdog
# ──────────────────────────────────────────────────────────────────────────────
# Non-maskable interrupt watchdog for detecting hard lockups.
#
# Default: 1 (enabled)
# 0 = disabled (saves CPU cycles, reduces latency)

kernel.nmi_watchdog = 0
#
#
#
#
# kernel.watchdog
# ──────────────────────────────────────────────────────────────────────────────
# Master switch for all watchdog functionality.
#
# Default: 1 (enabled)
# 0 = disable all watchdogs

kernel.watchdog = 0
#
#
#
#
# kernel.watchdog_thresh
# ──────────────────────────────────────────────────────────────────────────────
# Threshold in seconds for watchdog to detect lockup.
#
# Default: 10
# 0 = disabled

kernel.watchdog_thresh = 0
#
#
#
#
##============================================================================##
 #                         KERNEL PERFORMANCE                                 #
##============================================================================##
#
# kernel.split_lock_mitigate
# ──────────────────────────────────────────────────────────────────────────────
# Mitigates performance impact of split lock operations.
# Split locks can severely impact performance on multi-core systems.
#
# Default: 1 (enabled)
# 0 = disable mitigation (faster but may affect other cores)

kernel.split_lock_mitigate = 0
#
#
#
#
# kernel.numa_balancing
# ──────────────────────────────────────────────────────────────────────────────
# Automatic NUMA memory balancing.
# Moves memory pages closer to the CPU accessing them.
#
# Default: 1 (enabled on NUMA systems)
# 0 = disable (reduces overhead on single-socket systems)
#
# For single CPU/socket systems: disable

kernel.numa_balancing = 0
#
#
#
#
# kernel.sched_autogroup_enabled
# ──────────────────────────────────────────────────────────────────────────────
# Groups tasks by TTY for fairer CPU distribution.
# Helps desktop responsiveness when background tasks run.
#
# Default: 1 (enabled)
# 1 = better interactive performance
# 0 = traditional scheduling

kernel.sched_autogroup_enabled = 1
#
#
#
#
# kernel.nmi_watchdog
# ──────────────────────────────────────────────────────────────────────────────
# Faster boot and shotdown times

kernel.nmi_watchdog = 0
#
#
#
#
##============================================================================##
 #                          KERNEL SECURITY & MISC                            #
##============================================================================##
#
# kernel.printk
# ──────────────────────────────────────────────────────────────────────────────
# Console log level: console_loglevel, default_message_loglevel,
# minimum_console_loglevel, default_console_loglevel
#
# Default: 4 4 1 7
# 3 3 3 3 = only critical errors shown (quiet console)

kernel.printk = 3 3 3 3
#
#
#
#
# kernel.kptr_restrict
# ──────────────────────────────────────────────────────────────────────────────
# Restricts exposure of kernel pointers in /proc.
#
# Default: 0
# 0 = kernel pointers visible (security risk)
# 1 = hide from unprivileged users
# 2 = hide from everyone except root with CAP_SYSLOG

kernel.kptr_restrict = 1
#
#
#
#
# kernel.kexec_load_disabled
# ──────────────────────────────────────────────────────────────────────────────
# Disables kexec system call to prevent runtime kernel replacement.
#
# Default: 0 (allowed)
# 1 = disable kexec (security hardening, one-way setting)

kernel.kexec_load_disabled = 1
#
#
#
#
# kernel.unprivileged_userns_clone
# ──────────────────────────────────────────────────────────────────────────────
# Allows unprivileged users to create user namespaces.
# Required for: Flatpak, some browsers, rootless containers.
#
# Default: varies by distro
# 0 = disabled (more secure)
# 1 = enabled (needed for Flatpak, browsers, Steam, allow normal users to run unprivileged containers)

kernel.unprivileged_userns_clone = 1
#
#
#

##============================================================================##
 #                          WINE / PROTON / GAMING                            #
##============================================================================##
#
# vm.max_map_count
# ──────────────────────────────────────────────────────────────────────────────
# Maximum number of memory map areas a process can have.
# Required for: Wine, Proton, Unreal Engine games, some IDEs.
#
# Default: 65530
# Wine/Proton requirement: 524288+
# Some games need maximum: 2147483642

vm.max_map_count = 2147483642
#
#
#

##============================================================================##
 #                          NETWORK - TCP/IP STACK                            #
##============================================================================##
#
# net.core.default_qdisc
# ──────────────────────────────────────────────────────────────────────────────
# Default queuing discipline for network devices.
#
# Default: fq_codel
# fq = fair queuing (required for BBR)

net.core.default_qdisc = fq
#
#
#
#
# net.ipv4.tcp_congestion_control
# ──────────────────────────────────────────────────────────────────────────────
# TCP congestion control algorithm.
#
# Default: cubic
# bbr = Google's BBR (better latency and throughput)
#
# Check available: sysctl net.ipv4.tcp_available_congestion_control

net.ipv4.tcp_congestion_control = bbr
#
#
#
#
# net.core.netdev_max_backlog
# ──────────────────────────────────────────────────────────────────────────────
# Maximum packets queued on input when interface receives faster than kernel.
#
# Default: 1000
# For high-speed networks: 16384+

net.core.netdev_max_backlog = 16384
#
#
#

##============================================================================##
 #                          NETWORK - BUFFER SIZES                            #
##============================================================================##
#
# net.core.rmem_max / net.core.wmem_max
# ──────────────────────────────────────────────────────────────────────────────
# Maximum socket receive/send buffer size in bytes.
#
# Default: 212992
# For gaming/streaming: 67108864 (64MB)

net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
#
#
#
#
# net.ipv4.tcp_rmem / net.ipv4.tcp_wmem
# ──────────────────────────────────────────────────────────────────────────────
# TCP socket buffer sizes: min, default, max (in bytes).
#
# Default: 4096 131072 6291456
# Gaming optimized: larger max for burst handling

net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
#
#
#

##============================================================================##
 #                          NETWORK - LATENCY TUNING                          #
##============================================================================##
#
# net.ipv4.tcp_fastopen
# ──────────────────────────────────────────────────────────────────────────────
# TCP Fast Open - reduces latency on repeated connections.
#
# Default: 1
# 0 = disabled
# 1 = enable for outgoing
# 2 = enable for incoming
# 3 = enable for both

net.ipv4.tcp_fastopen = 3
#
#
#
#
# net.ipv4.tcp_slow_start_after_idle
# ──────────────────────────────────────────────────────────────────────────────
# Reset congestion window after connection idle.
#
# Default: 1 (enabled)
# 0 = maintain congestion window (better for gaming)

net.ipv4.tcp_slow_start_after_idle = 0
#
#
#
#
# net.ipv4.tcp_no_metrics_save
# ──────────────────────────────────────────────────────────────────────────────
# Don't cache TCP metrics from previous connections.
#
# Default: 0 (cache metrics)
# 1 = fresh start each connection (better for variable networks)

net.ipv4.tcp_no_metrics_save = 1
#
#
#
#
# net.ipv4.tcp_tw_reuse
# ──────────────────────────────────────────────────────────────────────────────
# Reuse TIME_WAIT sockets for new connections.
#
# Default: 2
# 0 = disabled
# 1 = global enable
# 2 = loopback only

net.ipv4.tcp_tw_reuse = 1
#
#
#
#
# net.ipv4.tcp_fin_timeout
# ──────────────────────────────────────────────────────────────────────────────
# Time to hold socket in FIN-WAIT-2 state (seconds).
#
# Default: 60
# Lower = free up sockets faster

net.ipv4.tcp_fin_timeout = 15
#
#
#

##============================================================================##
 #                          NETWORK - KEEPALIVE                               #
##============================================================================##
#
# net.ipv4.tcp_keepalive_time
# ──────────────────────────────────────────────────────────────────────────────
# Seconds before sending first keepalive probe.
#
# Default: 7200 (2 hours)
# For gaming: 300 (5 minutes) detects dead connections faster

net.ipv4.tcp_keepalive_time = 300
#
#
#
#
# net.ipv4.tcp_keepalive_intvl
# ──────────────────────────────────────────────────────────────────────────────
# Seconds between keepalive probes.
#
# Default: 75

net.ipv4.tcp_keepalive_intvl = 30
#
#
#
#
# net.ipv4.tcp_keepalive_probes
# ──────────────────────────────────────────────────────────────────────────────
# Number of keepalive probes before declaring connection dead.
#
# Default: 9

net.ipv4.tcp_keepalive_probes = 5
#
#
#

##============================================================================##
 #                          FILE SYSTEM LIMITS                                #
##============================================================================##
#
# fs.file-max
# ──────────────────────────────────────────────────────────────────────────────
# Maximum file descriptors system-wide.
#
# Default: varies (usually ~100000)
# For heavy gaming/Steam/Wine: 2097152

fs.file-max = 2097152
#
#
#
#
# fs.inotify.max_user_watches
# ──────────────────────────────────────────────────────────────────────────────
# Maximum inotify watches per user.
# Used by: IDEs, file managers, Steam, Dropbox, etc.
#
# Default: 8192
# If you get "inotify watch limit reached": increase this

fs.inotify.max_user_watches = 1548576
#
#
#
#
# fs.inotify.max_user_instances
# ──────────────────────────────────────────────────────────────────────────────
# Maximum inotify instances per user.
#
# Default: 128

fs.inotify.max_user_instances = 8192
#
#
#
#
# fs.inotify.max_queued_events
# ──────────────────────────────────────────────────────────────────────────────
# Maximum events queued per inotify instance.
#
# Default: 16384

fs.inotify.max_queued_events = 65536
#
#
#
#
# fs.aio-max-nr
# ──────────────────────────────────────────────────────────────────────────────
# Maximum async I/O operations system-wide.
#
# Default: 65536
# For databases, heavy I/O: 1048576

fs.aio-max-nr = 1048576
#
