###############################################################################
#                                                                             #
#                     Nordix NVIDIA GPU Configuration                         #
#                                                                             #
#  File:      /etc/modprobe.d/nvidia.conf                                     #
#  Purpose:   Kernel module parameters for the proprietary NVIDIA driver      #
#  Applies:   NVIDIA GeForce GTX 900-series and newer (Maxwell 2.0+)          #
#             Best suited for Turing (RTX 20xx) and newer                     #
#                                                                             #
#  Modules:   This file configures three kernel modules:                      #
#               nvidia        – Core GPU driver (NVreg_ parameters)           #
#               nvidia_drm    – DRM/KMS interface (modeset, fbdev)            #
#               nvidia_uvm    – Unified Virtual Memory for CUDA               #
#                                                                             #
#  After making changes you must either:                                      #
#    1. Reboot the system, OR                                                 #
#    2. Rebuild initramfs (sudo mkinitcpio -P) and then reboot                #
#       (required if nvidia modules are loaded from initramfs)                #
#                                                                             #
#  To verify a parameter is active after reboot:                              #
#    cat /proc/driver/nvidia/params                                           #
#    cat /sys/module/nvidia_drm/parameters/modeset                            #
#                                                                             #
#  WARNING: NVIDIA parameters use the NVreg_ prefix and are case-sensitive.   #
#           Incorrect values may cause black screens or boot failure.         #
#           Always have a fallback (e.g. nomodeset in bootloader) ready.      #
#                                                                             #
###############################################################################


###############################################################################
# nvidia_drm – DRM / Kernel Mode Setting
###############################################################################
#
# The nvidia_drm module provides the interface between the NVIDIA driver
# and the Linux Direct Rendering Manager (DRM) subsystem. These settings
# are critical for Wayland compositors and modern display servers.
#
#-----------------------------------------------------------------------------

# modeset – Enable DRM kernel mode setting (KMS)
#
#   Values:   0 = Disabled (legacy X11 mode only)
#             1 = Enabled  (required for Wayland)
#   Nordix:   1
#
#   KMS allows the kernel to manage display mode setting (resolution,
#   refresh rate, display output) instead of leaving it to the X server.
#   This is a hard requirement for:
#     - Wayland compositors (Hyprland, Sway, KDE Plasma 6, GNOME 46+)
#     - PRIME render offload (hybrid GPU laptops)
#     - Proper VT (virtual terminal) switching without flicker
#     - Hardware cursor support under Wayland
#
#   Without this, you will get a black screen on Wayland or fall back to
#   software rendering. Since nvidia-utils 560.35.03-5 on Arch, this is
#   enabled by default, but we set it explicitly for clarity and for
#   older driver versions.
#
options nvidia_drm modeset=1


# fbdev – Framebuffer device for console on Wayland
#
#   Values:   0 = Disabled (no NVIDIA framebuffer console)
#             1 = Enabled  (NVIDIA provides fbdev for TTY/console)
#   Nordix:   1
#
#   Creates a framebuffer device (/dev/fb0) backed by the NVIDIA GPU,
#   which provides a working text console (TTY) when using Wayland.
#
#   Without this, switching to a virtual terminal (Ctrl+Alt+F2) while
#   running a Wayland session may result in a black screen or garbled
#   output because there is no framebuffer backing the console.
#
#   Available since driver version 545. On older drivers this parameter
#   does not exist and will be silently ignored.
#
#   The alternative without fbdev=1 is to rely on simpledrm or efifb,
#   but those provide only a static, low-resolution console. With
#   fbdev=1 the console runs at native resolution.
#
options nvidia_drm fbdev=1


###############################################################################
# nvidia – Core Driver Parameters
###############################################################################
#
# These NVreg_ parameters control the behavior of the main nvidia.ko
# kernel module. They affect memory management, power management, GPU
# firmware, and hardware feature enablement.
#
# IMPORTANT: All NVreg_ parameters are case-sensitive. "NVreg_useP..."
# will NOT work — it must be "NVreg_UseP...".
#
#-----------------------------------------------------------------------------

# NVreg_PreserveVideoMemoryAllocations – Preserve VRAM on suspend/resume
#
#   Values:   0 = Disabled (VRAM is lost on suspend; applications may crash)
#             1 = Enabled  (driver saves VRAM contents to system RAM on suspend)
#   Nordix:   1
#
#   When your system enters sleep (suspend to RAM) or hibernation, the
#   GPU loses power and all VRAM contents are destroyed. With this
#   option enabled, the driver copies all VRAM allocations to system
#   RAM before suspend and restores them on resume.
#
#   This is essential for:
#     - Wayland sessions surviving sleep without black screens
#     - Keeping GPU-accelerated applications alive after resume
#     - Avoiding session crashes or compositor restarts after wake
#
#   Requires the following systemd services to be enabled:
#     sudo systemctl enable nvidia-suspend.service
#     sudo systemctl enable nvidia-resume.service
#     sudo systemctl enable nvidia-hibernate.service
#
#   Note: On laptops with PRIME (hybrid graphics), this may cause
#   issues with sleep on some configurations. If you experience
#   problems waking from suspend on a laptop, try disabling this.
#
#   The driver uses NVreg_TemporaryFilePath (see below) to store the
#   saved VRAM contents.
#
options nvidia NVreg_PreserveVideoMemoryAllocations=1


# NVreg_UsePageAttributeTable – Enable PAT for memory management
#
#   Values:   0 = Disabled (use MTRRs for memory type control)
#             1 = Enabled  (use Page Attribute Table instead)
#   Nordix:   1
#
#   The Page Attribute Table (PAT) is a modern CPU feature that provides
#   finer-grained control over memory caching and write-combining
#   attributes compared to the legacy MTRR (Memory Type Range Register)
#   system.
#
#   Benefits of enabling PAT:
#     - More efficient write-combining for GPU framebuffer access
#     - Better performance for CPU-to-GPU memory transfers
#     - Fewer conflicts with other drivers using MTRR slots
#     - Required for optimal performance with large VRAM GPUs
#
#   All modern x86 CPUs (anything from the last 15+ years) support PAT.
#   There is no reason to disable this unless you encounter a very rare
#   conflict with another kernel module.
#
options nvidia NVreg_UsePageAttributeTable=1


# NVreg_DynamicPowerManagement – Runtime power management (RTD3)
#
#   Values:   0x00 = Disabled   (GPU stays fully powered at all times)
#             0x01 = Coarse     (GPU powers down when no app uses NVIDIA stack)
#             0x02 = Fine-grain (GPU powers down even when apps are open but
#                                idle; monitors GPU utilization actively)
#   Nordix:   0x02
#
#   Runtime D3 (RTD3) power management allows the NVIDIA GPU to enter a
#   deep sleep state (D3cold) when it is not actively being used,
#   drastically reducing power consumption and heat output.
#
#   Mode 0x02 (fine-grained) is the most aggressive and useful setting:
#     - GPU powers down after a brief idle period (~5 seconds)
#     - GPU wakes instantly when an application accesses it
#     - Saves significant power on desktop systems at idle
#     - Essential for laptop battery life with hybrid graphics
#
#   Requirements for RTD3 to actually work:
#     - Turing (RTX 20xx) or newer GPU
#     - PCIe power management must be enabled in BIOS
#     - The udev rule from NVIDIA must be installed:
#       /lib/udev/rules.d/80-nvidia-pm.rules
#
#   On desktop systems with a single NVIDIA GPU driving a display, the
#   GPU will not enter D3cold because it is actively scanning out to
#   the monitor. However, the driver may still reduce clock speeds and
#   power draw during desktop idle with this setting.
#
#   On pre-Turing GPUs (GTX 10xx and older) this setting is ignored.
#
options nvidia NVreg_DynamicPowerManagement=0x02


# NVreg_TemporaryFilePath – Path for temporary driver files
#
#   Values:   Any writable directory path
#   Nordix:   /tmp
#
#   The NVIDIA driver needs a writable directory for temporary files,
#   most importantly for storing VRAM contents during suspend/resume
#   (when NVreg_PreserveVideoMemoryAllocations=1).
#
#   Using /tmp is recommended because:
#     - It is typically a tmpfs (RAM-backed), so reads/writes are fast
#     - Suspend/resume VRAM save/restore is significantly faster
#     - No wear on SSDs from large temporary writes
#
#   The amount of space needed equals your GPU's VRAM size. A 12 GB
#   GPU will need up to 12 GB of free space in /tmp during suspend.
#   Make sure your tmpfs is large enough (check with: df -h /tmp).
#
#   If /tmp is too small or not tmpfs, use /var/tmp instead (but
#   expect slower suspend/resume since it writes to disk).
#
options nvidia NVreg_TemporaryFilePath=/tmp


# NVreg_EnableGpuFirmware – GPU System Processor (GSP) firmware
#
#   Values:   0 = Disabled (driver handles GPU management on the CPU)
#             1 = Enabled  (offload GPU management to the onboard GSP)
#   Nordix:   0
#
#   Modern NVIDIA GPUs (Turing and newer) contain a GPU System Processor
#   (GSP) — a RISC-V core on the GPU die that can handle initialization,
#   power management, and certain driver operations autonomously.
#
#   When enabled, the driver offloads these tasks to the GSP, which can
#   reduce CPU overhead and latency for certain operations because the
#   GSP has faster access to GPU hardware internals.
#
#   Disabled (0) for Nordix because:
#     - GSP firmware has known issues on Turing GPUs (suboptimal power
#       management, higher idle power consumption)
#     - Some Ampere laptop GPUs fail to initialize with GSP enabled
#     - Stability is more important than the marginal performance gain
#     - The community generally recommends disabling GSP until NVIDIA
#       resolves the remaining firmware issues
#
#   Enable (1) if you have an Ada Lovelace (RTX 40xx) or newer GPU
#   where GSP support is more mature, and you want to test it.
#
#   Check current GSP status:
#     nvidia-smi -q | grep "GSP Firmware"
#
options nvidia NVreg_EnableGpuFirmware=0


###############################################################################
# ADDITIONAL RECOMMENDED PARAMETERS
###############################################################################
#
# The following parameters are not in the minimal Nordix config by default
# but are commonly useful. Uncomment any that apply to your system.
#
#-----------------------------------------------------------------------------

# NVreg_EnableResizableBar – Resizable BAR (ReBAR) / Smart Access Memory
#
#   Values:   0 = Disabled
#             1 = Enabled
#   Default:  0
#
#   Resizable BAR allows the CPU to access the GPU's entire VRAM over
#   PCIe in one contiguous mapping, instead of the traditional 256 MB
#   window. This can improve performance in games and applications that
#   benefit from faster CPU-to-VRAM transfers.
#
#   Requirements:
#     - GPU: Turing (RTX 20xx) or newer
#     - Motherboard: UEFI BIOS with "Resizable BAR" or "Above 4G
#       Decoding" and "Re-Size BAR" enabled
#     - Linux kernel 5.12+ with CONFIG_PCI_P2PDMA
#
#   Verify support: nvidia-settings → GPU information → "Resizable BAR"
#   (Note: this column may not appear in Wayland sessions)
#
#   If your hardware supports it, this is a free performance boost.
#   No downside to enabling when supported.
#
#options nvidia NVreg_EnableResizableBar=1


# NVreg_InitializeSystemMemoryAllocations – Clear system memory before GPU use
#
#   Values:   0 = Disabled (skip clearing; faster but less secure)
#             1 = Enabled  (clear all system memory before GPU access)
#   Default:  1
#
#   For security, the driver normally zeros out any system RAM before
#   allowing the GPU to use it, preventing potential data leakage from
#   other processes.
#
#   Disabling this (0) provides a small performance improvement by
#   skipping the memset operations. Useful for:
#     - Desktop systems where security isolation is less critical
#     - KDE 6 + Wayland: prevents black screen or freeze after wake
#     - Reducing latency in GPU memory allocation paths
#
#   Do NOT disable on multi-user systems or machines handling
#   sensitive data, as it may expose stale memory contents to the GPU.
#
#options nvidia NVreg_InitializeSystemMemoryAllocations=0


# NVreg_EnableMSI – Message Signaled Interrupts
#
#   Values:   0 = Disabled (use legacy line-based interrupts)
#             1 = Enabled  (use MSI for GPU interrupts)
#   Default:  1
#
#   MSI provides better interrupt delivery performance and avoids IRQ
#   sharing conflicts with other devices. Enabled by default.
#
#   Only disable (0) if you experience:
#     - X/Wayland fails to start with NVIDIA
#     - CUDA initialization failures
#     - GPU hangs at boot that go away with nomodeset
#
#   These issues are rare and typically indicate a buggy BIOS or
#   incompatible PCIe bridge.
#
#options nvidia NVreg_EnableMSI=1


# NVreg_RegistryDwords – Advanced registry overrides
#
#   Format:   Semicolon-separated key=value pairs
#   Default:  (none)
#
#   This is a catch-all parameter for internal driver settings that
#   do not have their own NVreg_ parameter. Some useful keys:
#
#   RMIntrLockingMode=1
#     Improves frame pacing by reducing interrupt latency jitter.
#     Most beneficial at high refresh rates (144Hz+) and with VRR
#     (FreeSync/G-Sync). Enabled by default since driver 580.xx.
#     For older drivers (570.xx and below), enable manually.
#
#   PowerMizerEnable=0x1
#     Enables PowerMizer dynamic clock management.
#     May not work on driver 530+ (functionality removed).
#
#   RMUseSwI2c=0x01
#     Forces software I2C instead of hardware I2C.
#     Fixes DDC/CI monitor control issues (e.g., ddcutil).
#
#   RMI2cSpeed=100
#     Sets I2C bus speed in kHz. Lower values improve reliability
#     for DDC/CI monitor communication over long cables.
#
#options nvidia NVreg_RegistryDwords="RMIntrLockingMode=1;"


# NVreg_EnablePCIeGen3 – Force PCIe Generation 3 speed
#
#   Values:   0 = Disabled (use Gen2)
#             1 = Enable if driver considers it safe (default)
#             2 = Same as 1 (legacy)
#             3 = Force Gen3 (override safety checks)
#   Default:  1
#
#   The NVIDIA driver defaults to PCIe Gen2 for maximum compatibility.
#   Gen3 doubles bandwidth (8 GT/s vs 5 GT/s) which can measurably
#   improve performance in bandwidth-limited scenarios.
#
#   Most modern systems run Gen3 or Gen4 without issues. Only use
#   value 3 if Gen3 is not auto-detected despite hardware support.
#
#options nvidia NVreg_EnablePCIeGen3=1


###############################################################################
# nvidia_uvm – Unified Virtual Memory (CUDA)
###############################################################################
#
# The nvidia_uvm module provides the Unified Virtual Memory subsystem
# used by CUDA and GPU compute applications. It allows GPU and CPU to
# share a unified address space.
#
# By default, nvidia_uvm uses Heterogeneous Memory Management (HMM)
# for memory migration between CPU and GPU. This is the correct mode
# for most workloads.
#
# The nvidia_uvm module is auto-loaded when a CUDA application starts.
# If you do not use CUDA, this module is never loaded.
#
# Uncomment the line below only if you need to disable HMM (rare):
#
#options nvidia_uvm uvm_disable_hmm=1


###############################################################################
