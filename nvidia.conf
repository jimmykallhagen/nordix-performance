#  QUICK REFERENCE TABLE                                                      #
#                                                                             #
#  Module       Parameter                              Nordix    Effect       #
#  ───────────  ─────────────────────────────────────  ────────  ───────────  #
#  nvidia_drm   modeset                                1         KMS on       #
#  nvidia_drm   fbdev                                  1         FB console   #
#  nvidia       NVreg_PreserveVideoMemoryAllocations   1         VRAM save    #
#  nvidia       NVreg_UsePageAttributeTable            1         PAT on       #
#  nvidia       NVreg_DynamicPowerManagement           0x02      Fine RTD3    #
#  nvidia       NVreg_TemporaryFilePath                /tmp      Fast tmpfs   #
#  nvidia       NVreg_EnableGpuFirmware                0         GSP off      #
#                                                                             #
###############################################################################


